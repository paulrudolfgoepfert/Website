<!DOCTYPE html>
<html>
<head>
    <style>
        /* Styling für den Ladebalken */
        .loader-container {
            background: #f3f3f3;
            border-radius: 15px; /* Abgerundete Ecken */
            width: 30%; /* Breite */
            height: 10px; /* Höhe */
            overflow: hidden;
            margin: 20px auto; /* Zentrierung */
        }

        .loader {
            background: #000;
            height: 100%;
            width: 0;
            transition: width 0.5s; /* Langsame Animation */
        }

        /* Optional: Styling für den Text */
        .percentage {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
  
<h1>Hello World!</h1>
  
<p>You have just reached one end of the internet. Congratulations!</p>

<p>By the moment you have clicked on this website, the download of the whole internet was initialized.</p> 

<!-- Hier wird der Ladebalken hinzugefügt -->
<div class="loader-container">
    <div class="loader" id="loader"></div>
</div>
<div class="percentage" id="percentage">0%</div>

<script>
    let width = 0;
    const loader = document.getElementById('loader');
    const percentageText = document.getElementById('percentage');

    const interval = setInterval(() => {
        if (width >= 99) {
            clearInterval(interval);
        } else {
            width++;
            loader.style.width = width + '%';
            percentageText.innerText = width + '%';
        }
    }, 300); // Geschwindigkeit auf langsamer geändert
</script>

<p>As this may take a while, please feel free to have a look at my <a href="https://github.com/paulrudolfgoepfert/Website/blob/main/CurriculumVitaePaulG%C3%B6pfert%20(Website).pdf">CV</a>
>CV</a>.</p>
  
</body>
</html>
